name: TG Bot
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          pip install aiohttp python-telegram-bot==20.*
      - name: Run
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
        run: python main.py
